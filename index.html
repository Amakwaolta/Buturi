
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
canvas{display:block;border-radius:8px;border:0.5px solid var(--color-border-tertiary);background:#f0ede6}
.panel{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:12px;padding:12px 14px;margin-bottom:10px}
.panel-title{font-size:12px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.player-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
.player-card{border-radius:8px;padding:8px 10px;border:0.5px solid}
.player-card.blue{background:#E6F1FB;border-color:#85B7EB}
.player-card.red{background:#FAECE7;border-color:#F0997B}
.player-name{font-size:12px;font-weight:500;margin-bottom:6px}
.player-name.blue{color:#0C447C}
.player-name.red{color:#712B13}
.slider-row{display:flex;align-items:center;gap:5px;margin-bottom:4px}
.slider-row label{font-size:11px;color:var(--color-text-secondary);width:26px;flex-shrink:0}
.slider-row input[type=range]{flex:1;height:4px}
.slider-row span{font-size:11px;font-weight:500;min-width:30px;text-align:right;color:var(--color-text-primary)}
.btns{display:flex;gap:8px;margin-top:10px}
.btns button{flex:1;padding:9px;font-size:14px;border-radius:8px;cursor:pointer;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary)}
.btns button.primary{background:#185FA5;color:#fff;border-color:#185FA5;font-weight:500}
.btns button.primary:hover{background:#0C447C}
.stats-bar{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.stat-chip{background:var(--color-background-secondary);border-radius:20px;padding:3px 10px;font-size:12px;color:var(--color-text-secondary)}
.winner{text-align:center;font-size:15px;font-weight:500;min-height:22px;margin-top:6px;color:var(--color-text-primary)}
</style>

<h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden">綱引き6対6物理シミュレーター — 各選手の身長・体重・ポジションが引っ張る力に影響します</h2>

<canvas id="c" width="680" height="240" style="width:100%;margin-bottom:10px"></canvas>
<div class="winner" id="winner"></div>
<div class="stats-bar" id="sbar">
  <span class="stat-chip" id="sc-f">合力: 0 N</span>
  <span class="stat-chip" id="sc-v">速度: 0 m/s</span>
  <span class="stat-chip" id="sc-t">時間: 0.0 s</span>
  <span class="stat-chip" id="sc-a">A総力: 0 N</span>
  <span class="stat-chip" id="sc-b">B総力: 0 N</span>
</div>

<div style="display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:10px;margin-top:10px">
  <div class="panel" style="border-top:3px solid #185FA5">
    <div class="panel-title" style="color:#185FA5">チームA（青）</div>
    <div class="player-grid" id="grid-a"></div>
  </div>
  <div class="panel" style="border-top:3px solid #993C1D">
    <div class="panel-title" style="color:#993C1D">チームB（赤）</div>
    <div class="player-grid" id="grid-b"></div>
  </div>
</div>

<div class="btns">
  <button class="primary" id="btn-start">▶ 開始</button>
  <button id="btn-reset">↺ リセット</button>
</div>

<script>
const W=680,H=240,GROUND_Y=H-30,ROPE_Y=H/2-10,WIN_DIST=100;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
canvas.width=W;canvas.height=H;

const NAMES_A=['A1','A2','A3','A4','A5','A6'];
const NAMES_B=['B1','B2','B3','B4','B5','B6'];

const defaultA=[
  {w:72,h:170},{w:85,h:182},{w:68,h:165},
  {w:90,h:178},{w:75,h:172},{w:80,h:176}
];
const defaultB=[
  {w:70,h:168},{w:88,h:185},{w:65,h:163},
  {w:95,h:180},{w:73,h:171},{w:78,h:175}
];

function buildGrid(containerId,names,defaults,teamClass){
  const grid=document.getElementById(containerId);
  grid.innerHTML='';
  names.forEach((name,i)=>{
    const d=defaults[i];
    const div=document.createElement('div');
    div.className='player-card '+teamClass;
    div.innerHTML=`
      <div class="player-name ${teamClass}">${name}</div>
      <div class="slider-row"><label>体重</label><input type="range" min="50" max="120" value="${d.w}" step="1" id="${containerId}-w${i}"><span id="${containerId}-wv${i}">${d.w}kg</span></div>
      <div class="slider-row"><label>身長</label><input type="range" min="150" max="200" value="${d.h}" step="1" id="${containerId}-h${i}"><span id="${containerId}-hv${i}">${d.h}cm</span></div>
      <div class="slider-row"><label>位置</label><input type="range" min="1" max="6" value="${i+1}" step="1" id="${containerId}-p${i}"><span id="${containerId}-pv${i}">${i+1}番</span></div>
    `;
    grid.appendChild(div);
    ['w','h','p'].forEach(type=>{
      const el=document.getElementById(`${containerId}-${type}${i}`);
      const sv=document.getElementById(`${containerId}-${type}${i==='p'?i:i}v${i}`);
      const unit=type==='w'?'kg':type==='h'?'cm':'番';
      el.addEventListener('input',()=>{
        document.getElementById(`${containerId}-${type}${i}v${i}`).textContent=el.value+unit;
        if(!running)drawStatic();
      });
    });
    ['w','h','p'].forEach(type=>{
      const el=document.getElementById(`${containerId}-${type}${i}`);
      el.addEventListener('input',()=>{
        const unit=type==='w'?'kg':type==='h'?'cm':'番';
        document.getElementById(`${containerId}-${type}${i}v${i}`).textContent=el.value+unit;
        if(!running)drawStatic();
      });
    });
  });
}

buildGrid('grid-a',NAMES_A,defaultA,'blue');
buildGrid('grid-b',NAMES_B,defaultB,'red');

function fixListeners(containerId){
  ['w','h','p'].forEach(type=>{
    for(let i=0;i<6;i++){
      const el=document.getElementById(`${containerId}-${type}${i}`);
      const unit=type==='w'?'kg':type==='h'?'cm':'番';
      const vid=`${containerId}-${type}${i}v${i}`;
      el.addEventListener('input',()=>{
        document.getElementById(vid).textContent=el.value+unit;
        if(!running)drawStatic();
      });
    }
  });
}
fixListeners('grid-a');fixListeners('grid-b');

function getPlayer(containerId,i){
  const w=+document.getElementById(`${containerId}-w${i}`).value;
  const h=+document.getElementById(`${containerId}-h${i}`).value;
  const pos=+document.getElementById(`${containerId}-p${i}`).value;
  return{w,h,pos};
}
function getTeam(containerId){
  return Array.from({length:6},(_,i)=>getPlayer(containerId,i));
}

const G=9.8,MU=0.72;

function playerForce(p,elapsed,fatigue){
  const heightFactor=0.8+((p.h-150)/50)*0.4;
  const weightFactor=Math.sqrt(p.w/70);
  const posFactor=p.pos<=2?1.1:p.pos<=4?1.0:0.92;
  const fatigueFactor=Math.max(0.35,1-fatigue*0.015*elapsed);
  const baseForce=320*heightFactor*weightFactor*posFactor*fatigueFactor;
  const frictionMax=p.w*G*MU;
  return Math.min(baseForce,frictionMax);
}

function teamTotalForce(players,elapsed,fatigue){
  return players.reduce((s,p)=>s+playerForce(p,elapsed,fatigue),0);
}
function teamMass(players){return players.reduce((s,p)=>s+p.w,0);}

let ropeX=W/2,velocity=0,elapsed=0,running=false,animId=null,lastTs=null;
const FATIGUE=4;

function drawScene(rx,teA,teB,elapsed){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#ede9df';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#ccc9be';ctx.fillRect(0,GROUND_Y,W,H-GROUND_Y);
  ctx.strokeStyle='rgba(100,100,100,0.25)';ctx.lineWidth=1;ctx.setLineDash([5,5]);
  ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,GROUND_Y);ctx.stroke();
  ctx.setLineDash([]);
  const wA=W/2-WIN_DIST,wB=W/2+WIN_DIST;
  ctx.strokeStyle='#185FA5';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
  ctx.beginPath();ctx.moveTo(wA,0);ctx.lineTo(wA,GROUND_Y);ctx.stroke();
  ctx.strokeStyle='#993C1D';ctx.beginPath();ctx.moveTo(wB,0);ctx.lineTo(wB,GROUND_Y);ctx.stroke();
  ctx.setLineDash([]);
  ctx.font='11px var(--font-sans)';ctx.fillStyle='#185FA5';ctx.fillText('A勝',wA-22,14);
  ctx.fillStyle='#993C1D';ctx.fillText('B勝',wB+4,14);

  const ROPE_LEN=280;
  const rx0=rx-ROPE_LEN/2,rx1=rx+ROPE_LEN/2;
  ctx.beginPath();
  for(let i=0;i<=12;i++){const t=i/12;ctx.lineTo(rx0+t*(rx1-rx0),ROPE_Y+Math.sin(t*Math.PI)*7);}
  ctx.strokeStyle='#7a5c2e';ctx.lineWidth=5;ctx.lineCap='round';ctx.stroke();
  ctx.beginPath();ctx.arc(rx,ROPE_Y,7,0,Math.PI*2);
  ctx.fillStyle='#b22';ctx.fill();
  ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();

  function drawFigure(x,color,colorLight,p,dir,slot){
    const scaleH=0.75+((p.h-150)/50)*0.35;
    const scaleW=0.8+(p.w-50)/140*0.5;
    const bodyH=40*scaleH,headR=8*scaleH,shoulderW=12*scaleW;
    const fy=GROUND_Y-bodyH-headR*2;
    ctx.strokeStyle=color;ctx.lineWidth=2;ctx.lineCap='round';
    ctx.fillStyle=colorLight;
    ctx.beginPath();ctx.arc(x,fy+headR,headR,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(x,fy+headR,headR,0,Math.PI*2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x,fy+headR*2);ctx.lineTo(x,fy+headR*2+bodyH);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x-shoulderW,fy+headR*2+bodyH*0.3);ctx.lineTo(x+shoulderW,fy+headR*2+bodyH*0.3);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x,fy+headR*2+bodyH);ctx.lineTo(x-7*scaleW,GROUND_Y);
    ctx.moveTo(x,fy+headR*2+bodyH);ctx.lineTo(x+7*scaleW,GROUND_Y);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x+dir*shoulderW,fy+headR*2+bodyH*0.3);
    ctx.lineTo(rx+(dir<0?-ROPE_LEN/2:ROPE_LEN/2),ROPE_Y);ctx.stroke();
    ctx.font=`11px var(--font-sans)`;ctx.fillStyle=color;
    ctx.textAlign='center';ctx.fillText(p.w+'kg',x,GROUND_Y+16);ctx.textAlign='left';
  }

  const SPACING=42;
  teA.forEach((p,i)=>{
    const posOrder=p.pos-1;
    const x=rx-ROPE_LEN/2-30-posOrder*SPACING;
    drawFigure(x,'#185FA5','#E6F1FB',p,-1,i);
  });
  teB.forEach((p,i)=>{
    const posOrder=p.pos-1;
    const x=rx+ROPE_LEN/2+30+posOrder*SPACING;
    drawFigure(x,'#993C1D','#FAECE7',p,1,i);
  });

  const fA=Math.round(teamTotalForce(teA,elapsed,FATIGUE));
  const fB=Math.round(teamTotalForce(teB,elapsed,FATIGUE));
  ctx.font='500 12px var(--font-sans)';
  ctx.fillStyle='#0C447C';ctx.fillText('A: '+fA+'N',10,H-8);
  ctx.fillStyle='#712B13';ctx.textAlign='right';ctx.fillText('B: '+fB+'N',W-10,H-8);
  ctx.textAlign='left';
}

function drawStatic(){
  const a=getTeam('grid-a'),b=getTeam('grid-b');
  drawScene(W/2,a,b,0);
  document.getElementById('winner').textContent='';
  document.getElementById('sc-f').textContent='合力: 0 N';
  document.getElementById('sc-v').textContent='速度: 0 m/s';
  document.getElementById('sc-t').textContent='時間: 0.0 s';
  const fA=Math.round(teamTotalForce(a,0,FATIGUE));
  const fB=Math.round(teamTotalForce(b,0,FATIGUE));
  document.getElementById('sc-a').textContent='A総力: '+fA+' N';
  document.getElementById('sc-b').textContent='B総力: '+fB+' N';
}

function step(ts){
  if(!lastTs)lastTs=ts;
  const dt=Math.min((ts-lastTs)/1000,0.05);lastTs=ts;elapsed+=dt;
  const a=getTeam('grid-a'),b=getTeam('grid-b');
  const fA=teamTotalForce(a,elapsed,FATIGUE),fB=teamTotalForce(b,elapsed,FATIGUE);
  const net=fA-fB;
  const mass=teamMass(a)+teamMass(b);
  const acc=net/mass;
  velocity+=acc*dt;velocity*=0.97;
  ropeX+=velocity*dt*60;
  drawScene(ropeX,a,b,elapsed);
  document.getElementById('sc-f').textContent='合力: '+Math.round(net)+' N';
  document.getElementById('sc-v').textContent='速度: '+velocity.toFixed(2)+' m/s';
  document.getElementById('sc-t').textContent='時間: '+elapsed.toFixed(1)+' s';
  document.getElementById('sc-a').textContent='A総力: '+Math.round(fA)+' N';
  document.getElementById('sc-b').textContent='B総力: '+Math.round(fB)+' N';
  if(ropeX<W/2-WIN_DIST){endGame('チームA（青）の勝ち！');}
  else if(ropeX>W/2+WIN_DIST){endGame('チームB（赤）の勝ち！');}
  else{animId=requestAnimationFrame(step);}
}

function endGame(msg){
  running=false;
  document.getElementById('winner').textContent=msg;
  document.getElementById('btn-start').textContent='▶ 開始';
}

document.getElementById('btn-start').addEventListener('click',()=>{
  if(running){running=false;cancelAnimationFrame(animId);document.getElementById('btn-start').textContent='▶ 開始';return;}
  running=true;lastTs=null;
  document.getElementById('btn-start').textContent='⏸ 一時停止';
  document.getElementById('winner').textContent='';
  animId=requestAnimationFrame(step);
});
document.getElementById('btn-reset').addEventListener('click',()=>{
  running=false;cancelAnimationFrame(animId);
  ropeX=W/2;velocity=0;elapsed=0;lastTs=null;
  document.getElementById('btn-start').textContent='▶ 開始';
  drawStatic();
});

drawStatic();
</script>
